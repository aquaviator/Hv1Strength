<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Solid Premium Dark Background -->
  <rect width="100" height="100" rx="16" fill="#0A0D10"/>
  
  <!-- Outer Circular Badge Ring (White) -->
  <circle cx="50" cy="50" r="40" stroke="#FFFFFF" stroke-width="4" fill="none"/>
  
  <!-- Head (White) -->
  <circle cx="50" cy="43" r="5.5" fill="#FFFFFF"/>
  
  <!-- Torso (White) -->
  <line x1="50" y1="49" x2="50" y2="68" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Legs (White) -->
  <line x1="50" y1="68" x2="41" y2="84" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="68" x2="59" y2="84" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Arms (White) -->
  <line x1="50" y1="52" x2="32" y2="32" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="52" x2="68" y2="32" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Barbell Bar (Electric Blue Accent) -->
  <line x1="18" y1="32" x2="82" y2="32" stroke="#0066FF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Barbell Weight Plates - Inner (Electric Blue Accent) -->
  <line x1="26" y1="20" x2="26" y2="44" stroke="#0066FF" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="74" y1="20" x2="74" y2="44" stroke="#0066FF" stroke-width="5.5" stroke-linecap="round"/>
  
  <!-- Barbell Weight Plates - Outer (Electric Blue Accent) -->
  <line x1="20" y1="24" x2="20" y2="40" stroke="#0066FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="24" x2="80" y2="40" stroke="#0066FF" stroke-width="4" stroke-linecap="round"/>
</svg>
